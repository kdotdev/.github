on:
  push:
    branches: ["main"]
    paths: ['.github/workflows/**']
  pull_request:
    branches: ["main"]
    paths: ['.github/workflows/**']

jobs:
  lint-workflows:
    runs-on: namespace-profile-ubuntu
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: |
          curl -sSLo actionlint.tar.gz https://github.com/rhysd/actionlint/releases/download/v1.6.26/actionlint_1.6.26_linux_amd64.tar.gz
          tar xzf actionlint.tar.gz
          ./actionlint
